name: macOS SSH Test

on:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build macOS + SSH
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: npm

      - name: Make macOS tools executable
        run: chmod +x resources/tools/ffmpeg/ffmpeg-darwin-* resources/tools/node/node-darwin-* resources/tools/yt-dlp/yt-dlp_macos

      - name: Install dependencies
        run: npm ci

      - name: Build distribution
        run: npm run dist -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Show what was built
        run: |
          echo "=== DMG files ==="
          ls -lh release/*.dmg 2>/dev/null || echo "No DMG found"
          echo ""
          echo "=== macOS app bundle ==="
          if [ -d "release/mac/WatchAlong.app" ]; then
            APP="release/mac/WatchAlong.app"
          elif [ -d "release/mac-arm64/WatchAlong.app" ]; then
            APP="release/mac-arm64/WatchAlong.app"
          else
            echo "Looking for app bundle..."
            find release -name "WatchAlong.app" -type d 2>/dev/null
            APP=$(find release -name "WatchAlong.app" -type d 2>/dev/null | head -1)
          fi
          echo "App: $APP"
          echo ""
          echo "=== macOS tools ==="
          ls -lh "$APP/Contents/Resources/tools/" 2>/dev/null || echo "No tools dir"
          echo ""
          echo "=== patreon-dl contents ==="
          ls -lh "$APP/Contents/Resources/tools/patreon-dl/node_modules/patreon-dl/bin/" 2>/dev/null || echo "No patreon-dl bin"
          ls -lh "$APP/Contents/Resources/tools/patreon-dl/node_modules/patreon-dl/dist/index.js" 2>/dev/null || echo "No patreon-dl dist"

      - name: Start SSH session
        uses: mxschmitt/action-tmate@v3