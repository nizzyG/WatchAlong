name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact-name: watchalong-windows
            artifact-path: release/*.exe
          - name: macOS
            os: macos-latest
            artifact-name: watchalong-macos
            artifact-path: release/*.dmg

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: npm

      - name: Make macOS tools executable
        if: runner.os == 'macOS'
        run: |
          chmod +x \
            resources/tools/ffmpeg/ffmpeg-darwin-* \
            resources/tools/node/node-darwin-* \
            resources/tools/yt-dlp/yt-dlp_macos

      - name: Install dependencies
        run: npm ci

      - name: Build distribution
        run: npm run dist -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-artifacts/*.exe
            dist-artifacts/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
